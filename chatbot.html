<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
    <link rel="stylesheet" href="static/styles.css">
    
    <style>
        body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    background-color: #000; /* Set the page background to black */
    color: white;
    padding-top: 0px; /* Remove padding for fixed navbar */
}

header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background-color: #000; /* Ensure the navbar has a background */
    z-index: 1000; /* Ensure navbar stays above other elements */
}

header .navbar {
    display: flex;
    padding: 20px 50px 20px 50px;
    align-items: center;
    justify-content: space-between;
}

/* Other styles remain unchanged */


/* Container for the logo and text */
.nav-logo {
    display: flex;
    align-items: center;
    /* Aligns logo and text vertically centered */
    gap: 10px;
    /* Adds spacing between the logo and text */
}

/* Logo Image Styling */
.nav-H-logo {
    height: 60px;
    /* Adjust logo size */
    width: auto;
    
}

/* Text Container */
.nav-logo-text {
    color: var(--white-color);
    text-align: center;
    flex-direction: column;
    /* Stacks heading and description vertically */
    justify-content: center;
}

/* Main Heading Styling */
.H-logo-text {
    font-size: var(--font-size-m);
}

.H-logo-text::after {
    content: "";
    width: 100px;
    height: 1px;
    display: block;
    margin: 1px auto 0;
    border-radius: var(--border-radius-s);
    background: var(--secondary-color);
}

/* Description Text Styling */
.H-Logo-Description {
    font-size: var(--font-size-s);
    margin-top: 3px;
}

.navbar .nav-menu {
    display: flex;
    gap: 10px;
}

.navbar .nav-menu .nav-link {
    padding: 10px 15px;
    color: var(--white-color);
    font-size: var(--font-size-s);
    border-radius: var(--border-radius-m);
    transition: 0.3s ease;
    display: block;
    /* Ensure the link fills the space */
    text-decoration: none;
    /* Remove underline */
}

.navbar .nav-menu .nav-link:hover {
    color: var(--dark-color);
    background: var(--secondary-color);
    /* Hover gradient */
}

.navbar :where(#menu-close-button, #menu-open-button) {
    display: none;
}


        /* Chatbot Container */
        .chat-container {
            width: 100%;
            max-width: 450px;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2); /* Shadow effect */
            overflow: hidden;
            margin-top: 100px;
        }

        .chat-window {
            height: 300px;
            overflow-y: auto;
            padding: 20px;
            background-color: #f9f9f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-height: 300px;
            border-bottom: 2px solid #ddd;
        }

        .chat-window p {
            margin: 5px 0;
        }

        .user-message {
            text-align: right;
            color: #008CBA;
        }

        .bot-message {
            text-align: left;
            color: #28a745;
        }

        .menu-message {
            text-align: left;
            color: black; /* Set the color of the menu text to black */
            font-weight: bold;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 16px;
            border-radius: 25px;
            border: 2px solid #ddd;
            margin: 10px 10px 20px 10px;
            outline: none;
            transition: 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #4CAF50;
        }

        button {
            width: 18%;
            padding: 12px;
            font-size: 16px;
            border-radius: 25px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Responsive Design for smaller screens */
        @media (max-width: 480px) {
            .chat-container {
                width: 95%;
                max-width: 100%;
            }

            input[type="text"] {
                width: 70%;
            }

            button {
                width: 20%;
            }
        }
    </style>
</head>
<body>

<header>
    <nav class="navbar section-content" id="home">
        <a href="#" class="nav-logo">
            <img src="static/img/Logo.jpg" alt="SJU Logo" class="nav-H-logo">
            <div class="nav-logo-text">
                <h2 class="H-logo-text">Vibhinna</h2>
                <p class="H-Logo-Description">INDIA FOUNDATION</p>
            </div>
        </a>

        <ul class="nav-menu">
            <button id="menu-close-button" class="fas fa-times"></button>
            <li class="nav-item">
                <a href="/" class="nav-link">Home</a>
            </li>
            <li class="nav-item">
                <a href="/about" class="nav-link">About US</a>
            </li>
            <li class="nav-item">
                <a href="/campaigns" class="nav-link">Our Campaigns</a>
            </li>
            <li class="nav-item">
                <a href="/chatbot" class="nav-link">Chatbot</a>
            </li>
            <li class="nav-item">
                <a href="/login" class="nav-link">Login</a>
            </li>
              <li class="nav-item">
                <a href="/donate" class="nav-link">Donate</a>
             </li>
            <li class="nav-item">
                <a href="/contact" class="nav-link">Contact Us</a>
            </li>
        </ul>
        <button id="menu-open-button" class="fas fa-bars"></button>
    </nav>
</header>

<div class="chat-container">
    <div class="chat-window" id="chat-window">
        <p><strong>Bot:</strong> Hi, what can I help you with today?</p>
        <p class="menu-message"><strong>Bot:</strong> 1. About Vibhinna</p>
        <p class="menu-message"><strong>Bot:</strong> 2. Our Campaigns</p>
        <p class="menu-message"><strong>Bot:</strong> 3. Volunteering</p>
        <p class="menu-message"><strong>Bot:</strong> 4. Donations</p>
        <p class="menu-message"><strong>Bot:</strong> 5. Exit</p>
        <p class="menu-message"><strong>Bot:</strong> Please enter the option number.</p>
    </div>
    
    <input type="text" id="user-input" placeholder="Type your message here..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    const responses = {
        "hi": "Hello! How can I help you?",
        "how are you": "I'm doing well, thank you!",
        "bye": "Goodbye! Have a nice day!",
        "1": "Vibhinna India Foundation is a registered Section 8 Organization focusing on creating a sustainable planet for human and environment. You can learn more about us <a href='http://127.0.0.1:5000/about' target='_blank'>here</a>.",
        "2": "We run a variety of campaigns like the Breathe Bengaluru Campaign, Million Drops, Solitude, Sapiens for Change, etc. You can learn more about us <a href='http://127.0.0.1:5000/campaigns' target='_blank'>here</a>.",
        "3": "We would love to have you as a part of our team. Please go here for more details. You can learn more about us <a href='http://127.0.0.1:5000/login' target='_blank'>here</a>.",
        "4": "Thank you so much for considering donating to us. Please go here for more details. You can learn more about us <a href='http://127.0.0.1:5000/donate' target='_blank'>here</a>.",
        "5": "Thank you for chatting with us. Goodbye!"
    };

    function sendMessage() {
        const userInput = document.getElementById('user-input').value.trim();
        const chatWindow = document.getElementById('chat-window');

        if (userInput) {
            const userMessage = document.createElement('p');
            userMessage.classList.add('user-message');
            userMessage.textContent = `You: ${userInput}`;
            chatWindow.appendChild(userMessage);

            const botReply = chatbotResponse(userInput);
            const botMessage = document.createElement('p');
            botMessage.classList.add('bot-message');
            botMessage.innerHTML = `Bot: ${botReply}`;  // This ensures links are rendered
            chatWindow.appendChild(botMessage);

            // Show the initial options again after each interaction
            displayInitialMenu();

            // Scroll to the bottom after the new message
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // Clear the input field
            document.getElementById('user-input').value = '';
        } else {
            const botMessage = document.createElement('p');
            botMessage.classList.add('bot-message');
            botMessage.textContent = 'Bot: Please enter a message.';
            chatWindow.appendChild(botMessage);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    }

    function chatbotResponse(userInput) {
        return responses[userInput.toLowerCase()] || "Sorry, I didn't understand that.";
    }

    // Function to display the initial menu with black text color
    function displayInitialMenu() {
        const chatWindow = document.getElementById('chat-window');

        // Display the options again with black text color
        setTimeout(() => {
            chatWindow.innerHTML += ` 
                <p class="menu-message"><strong>Bot:</strong> 1. About Vibhinna</p>
                <p class="menu-message"><strong>Bot:</strong> 2. Our Campaigns</p>
                <p class="menu-message"><strong>Bot:</strong> 3. Volunteering</p>
                <p class="menu-message"><strong>Bot:</strong> 4. Donations</p>
                <p class="menu-message"><strong>Bot:</strong> 5. Exit</p>
                <p class="menu-message"><strong>Bot:</strong> Please enter the option number.</p>
            `;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }, 500); // Slight delay before displaying the menu again
    }
</script>

</body>
</html>
